server {
    listen 80;
    server_name serenova.bosssystemsai.com;

    # Indispensable pour la validation Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirection vers HTTPS (sera activée après obtention du certificat)
    location / {
        return 301 https://$host$request_uri;
    }
}
