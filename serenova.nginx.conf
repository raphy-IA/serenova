# Map pour gérer les connexions WebSocket (utile pour les notifications hmr ou temps réel)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Redirection HTTP vers HTTPS
server {
    listen 80;
    server_name serenova.bosssystemsai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Configuration HTTPS finale
server {
    listen 443 ssl http2;
    server_name serenova.bosssystemsai.com;

    # Certificats SSL générés par Certbot
    ssl_certificate /etc/letsencrypt/live/serenova.bosssystemsai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/serenova.bosssystemsai.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/nginx/serenova_access.log;
    error_log /var/log/nginx/serenova_error.log;

    # Taille maximale du body pour les uploads (justificatifs baux, etc)
    client_max_body_size 20M;

    # Headers de sécurité standards
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Backend API
    location /api {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Web
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        
        # Support WebSocket pour le HMR si besoin
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
