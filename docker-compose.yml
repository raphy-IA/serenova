version: '3.8'

services:
  serenova-api:
    build:
      context: ./serenova-api
      dockerfile: Dockerfile
    container_name: serenova-api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
    networks:
      - serenova-network
    ports:
      - "3000:3000"

  serenova-web:
    build:
      context: ./serenova-web
      dockerfile: Dockerfile
    container_name: serenova-web
    restart: always
    environment:
      - VITE_API_URL=${VITE_API_URL}
    networks:
      - serenova-network
    ports:
      - "80:80"

networks:
  serenova-network:
    driver: bridge
